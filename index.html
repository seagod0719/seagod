<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>D2R Terror Master Final</title>
    <style>
        body { background-color: #1a1a1a; color: #d4c3a3; font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 600px; border: 2px solid #5e4b32; padding: 25px; background: #262626; border-radius: 10px; box-shadow: 0 0 20px #000; }
        h2 { text-align: center; color: #ff4500; text-shadow: 2px 2px 4px #000; }
        .status-box { background: #111; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px; border: 1px solid #444; }
        #current-zone { font-size: 1.6em; color: #fff; display: block; margin-bottom: 5px; font-weight: bold; }
        .manual-input { width: 100%; display: flex; gap: 5px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; background: #111; border: 1px solid #5e4b32; color: #fff; border-radius: 4px; }
        .zone-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; max-height: 400px; overflow-y: auto; background: #1a1a1a; padding: 10px; border: 1px solid #333; }
        .zone-item { font-size: 0.85em; display: flex; align-items: center; padding: 5px; cursor: pointer; border-radius: 4px; }
        .zone-item:hover { background: #333; }
        button { padding: 12px; background: #8b0000; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #b30000; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔥 TERROR MASTER FINAL</h2>
    <div class="status-box">
        <span id="current-zone">연결 시도 중...</span>
        <div id="timer" style="color: #ffbc00; font-family: monospace; margin-top:5px;">--:--</div>
    </div>

    <div class="manual-input">
        <input type="text" id="raw-input" placeholder="여기에 지역명 입력 (예: 카생, 성채, 혼돈)">
        <button onclick="manualCheck()">수동 확인</button>
    </div>

    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <strong style="color:#ffbc00">📍 알림 지역 선택 (체크한 곳만 알림)</strong>
        <button style="padding:4px 10px; font-size:11px; background:#444;" onclick="toggleAll(true)">전체 선택</button>
    </div>
    
    <div class="zone-grid" id="zone-grid"></div>
    
    <button style="width:100%; margin-top:10px;" onclick="startApp()">1. 알림 권한 허용 및 시작</button>
</div>

<script>
const ZONES = {
    "Blood Moor": "핏빛 황무지", "Cold Plains": "차거운 평야", "Burial Grounds": "매장지", "Stony Field": "바위 들판", "Dark Wood": "어둠의 숲", "Black Marsh": "검은 습지", "Forgotten Tower": "잊힌 탑", "Jail": "감옥", "Catacombs": "지하묘지 (안다)", "Cow Level": "카우방",
    "Sewers": "하수도", "Rocky Waste": "바위투성이 황무지", "Dry Hills": "메마른 언덕", "Far Oasis": "먼 오아시스", "Lost City": "잊힌 도시", "Ancient Tunnels": "고대 하수도", "Arcane Sanctuary": "비전의 성역", "Tal Rasha's Tombs": "탈 라샤 무덤",
    "Spider Forest": "거미 숲", "Flayer Jungle": "기아에 허덕이는 정글", "Kurast Bazaar": "쿠라스트 시장", "Travincal": "트라빈컬", "Durance of Hate": "증오의 억류지 (메피)",
    "Outer Steppes": "외곽 평원", "City of the Damned": "저주받은 자들의 도시", "River of Flame": "불길의 강", "Chaos Sanctuary": "혼돈의 성역 (카생)",
    "Bloody Foothills": "핏빛 언덕", "Frigid Highlands": "혹한의 고산지", "Nihlathak's Temple": "니들라탁의 사원", "Ancient's Way": "고대인의 길", "Worldstone Keep": "세계석 성채 (바알)"
};

// 지역 그리드 생성
const grid = document.getElementById('zone-grid');
Object.entries(ZONES).forEach(([en, ko]) => {
    grid.innerHTML += `<label class="zone-item"><input type="checkbox" class="zone-check" value="${en}"> ${ko}</label>`;
});

function toggleAll(s) { document.querySelectorAll('.zone-check').forEach(c => c.checked = s); }

async function startApp() {
    const perm = await Notification.requestPermission();
    if (perm === "granted") {
        alert("알림이 활성화되었습니다!");
        updateTZ();
    }
}

async function updateTZ() {
    try {
        // 다중 프록시 시도
        const target = encodeURIComponent('https://d2runewizard.com/api/terror-zone');
        const res = await fetch(`https://api.allorigins.win/get?url=${target}&_=${Date.now()}`);
        const json = await res.json();
        const data = JSON.parse(json.contents);
        
        if (data?.zone?.name) {
            display(data.zone.name);
        }
    } catch (e) {
        document.getElementById('current-zone').innerText = "자동 연결 실패 (수동 입력 필요)";
    }
}

function manualCheck() {
    const txt = document.getElementById('raw-input').value.trim();
    if (!txt) return;

    for (const [en, ko] of Object.entries(ZONES)) {
        // 입력한 글자가 영어명이나 한글명에 포함되어 있으면 인식
        if (en.toLowerCase().includes(txt.toLowerCase()) || ko.includes(txt)) {
            display(en);
            document.getElementById('raw-input').value = ""; // 입력창 초기화
            return;
        }
    }
    alert("지역명을 찾을 수 없습니다. (예: 카생, 바알, 혼돈 등)");
}

function display(en) {
    const koName = ZONES[en] || en;
    document.getElementById('current-zone').innerText = koName;
    
    // 정각 알림 체크
    const now = new Date();
    const checked = Array.from(document.querySelectorAll('.zone-check:checked')).map(c => c.value);
    if (now.getMinutes() === 0 && checked.includes(en)) {
        new Notification("🔥 테러존 발생!", { body: `지금 바로 접속: ${koName}` });
    }
}

setInterval(() => {
    const n = new Date();
    document.getElementById('timer').innerText = `${59-n.getMinutes()}분 ${59-n.getSeconds()}초 남음`;
    if (n.getMinutes() === 0 && n.getSeconds() === 0) updateTZ();
}, 1000);

updateTZ();
</script>
</body>
</html>
