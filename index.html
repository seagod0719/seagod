<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>D2R 실시간 테러존 알리미</title>
    <style>
        body { background-color: #1a1a1a; color: #d4c3a3; font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 600px; border: 2px solid #5e4b32; padding: 25px; background: #262626; border-radius: 10px; box-shadow: 0 0 20px #000; }
        h2 { text-align: center; color: #ff4500; text-shadow: 2px 2px 4px #000; margin-bottom: 20px; }
        .status-box { background: #111; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px; border: 1px solid #444; position: relative; }
        #current-zone { font-size: 1.8em; color: #fff; display: block; margin-bottom: 5px; font-weight: bold; text-shadow: 0 0 8px #ff4500; }
        #timer { color: #ffbc00; font-family: monospace; font-size: 1.1em; }
        .zone-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; max-height: 400px; overflow-y: auto; background: #1a1a1a; padding: 10px; border: 1px solid #333; }
        .zone-item { font-size: 0.85em; display: flex; align-items: center; padding: 6px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .zone-item:hover { background: #333; }
        .zone-item input { margin-right: 8px; }
        button { width: 100%; padding: 15px; background: #8b0000; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1em; }
        button:hover { background: #b30000; }
        .all-btn { background: #444; padding: 5px 10px; width: auto; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔥 실시간 테러존 알리미</h2>
    <div class="status-box">
        <span style="color:#888; font-size:0.9em;">현재 발생 지역</span>
        <span id="current-zone">데이터 동기화 중...</span>
        <div id="timer">--:-- 남음</div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong style="color:#ffbc00">📍 알림 받을 지역 선택</strong>
        <button class="all-btn" onclick="toggleAll(true)">전체 선택</button>
    </div>
    
    <div class="zone-grid" id="zone-grid"></div>
    
    <button onclick="startApp()">알림 권한 허용 및 감시 시작</button>
</div>

<script>
const ZONES = {
    "Blood Moor": "핏빛 황무지", "Cold Plains": "차거운 평야", "Burial Grounds": "매장지", "Stony Field": "바위 들판", "Dark Wood": "어둠의 숲", "Black Marsh": "검은 습지", "Forgotten Tower": "잊힌 탑", "Jail": "감옥", "Catacombs": "지하묘지 (안다)", "Secret Cow Level": "카우방",
    "Sewers": "하수도", "Rocky Waste": "바위투성이 황무지", "Dry Hills": "메마른 언덕", "Far Oasis": "먼 오아시스", "Lost City": "잊힌 도시", "Ancient Tunnels": "고대 하수도", "Arcane Sanctuary": "비전의 성역", "Tal Rasha's Tombs": "탈 라샤 무덤",
    "Spider Forest": "거미 숲", "Flayer Jungle": "기아에 허덕이는 정글", "Kurast Bazaar": "쿠라스트 시장", "Travincal": "트라빈컬", "Durance of Hate": "증오의 억류지 (메피)",
    "Outer Steppes": "외곽 평원", "City of the Damned": "저주받은 자들의 도시", "River of Flame": "불길의 강", "Chaos Sanctuary": "혼돈의 성역 (카생)",
    "Bloody Foothills": "핏빛 언덕", "Frigid Highlands": "혹한의 고산지", "Nihlathak's Temple": "니들라탁의 사원", "Ancient's Way": "고대인의 길", "Worldstone Keep": "세계석 성채 (바알)"
};

// 그리드 생성
const grid = document.getElementById('zone-grid');
Object.entries(ZONES).forEach(([en, ko]) => {
    grid.innerHTML += `<label class="zone-item"><input type="checkbox" class="zone-check" value="${en}"> ${ko}</label>`;
});

function toggleAll(s) { document.querySelectorAll('.zone-check').forEach(c => c.checked = s); }

async function startApp() {
    const perm = await Notification.requestPermission();
    if (perm === "granted") {
        alert("알림 감시가 시작되었습니다! 창을 끄지 마세요.");
        updateTZ();
    }
}

// [새로운 데이터 소스] - CORS 제한이 적고 안정적인 공개 API를 사용합니다.
async function updateTZ() {
    try {
        // d2runewizard가 막혔을 때를 대비해, 더 개방적인 미러 서버를 찌릅니다.
        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://d2runewizard.com/api/terror-zone')}&_=${Date.now()}`);
        const json = await res.json();
        const data = JSON.parse(json.contents);
        
        if (data && data.zone && data.zone.name) {
            const enName = data.zone.name;
            const koName = ZONES[enName] || enName;
            document.getElementById('current-zone').innerText = koName;
            
            // 실시간 체크 및 알림
            checkAndNotify(enName);
        }
    } catch (e) {
        document.getElementById('current-zone').innerText = "데이터 갱신 대기 중...";
    }
}

let lastNotifiedHour = -1;

function checkAndNotify(enName) {
    const now = new Date();
    const currentHour = now.getHours();
    
    // 정각이 되었을 때 (혹은 정각 직후 데이터가 바뀌었을 때) 딱 한 번만 실행
    if (lastNotifiedHour !== currentHour) {
        const checked = Array.from(document.querySelectorAll('.zone-check:checked')).map(c => c.value);
        if (checked.includes(enName)) {
            new Notification("🔥 원하는 테러존 발생!", {
                body: `현재 지역: ${ZONES[enName] || enName}\n지금 바로 접속하세요!`,
                icon: "https://d2runewizard.com/favicon.ico"
            });
        }
        lastNotifiedHour = currentHour;
    }
}

// 타이머 및 자동 갱신 (1초마다 실행)
setInterval(() => {
    const n = new Date();
    const m = 59 - n.getMinutes();
    const s = 59 - n.getSeconds();
    document.getElementById('timer').innerText = `${m}분 ${s}초 남음`;
    
    // 매분 10초마다 데이터를 확인 (정각 직후에는 더 자주 확인)
    if (n.getSeconds() === 10 || (n.getMinutes() === 0 && n.getSeconds() < 30)) {
        updateTZ();
    }
}, 1000);

// 초기 실행
updateTZ();
</script>
</body>
</html>
